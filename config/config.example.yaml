system:
  host_name: blackpanther
  language: de

paths:
  log_dir: logs
  state_dir: ~/.local/state/linux-backup-manager
  password_file: ~/.config/linux-backup-manager/restic.pass

backup:
  paths:
    - ~/Dokumente
    - ~/Bilder
    - ~/Schreibtisch
    - ~/Downloads
    - ~/Projekte

  excludes:
    - ~/.cache
    - ~/.local/share/Trash
    - ~/Downloads/*.iso
    - ~/Downloads/*.img
    - ~/Downloads/*.deb
    - ~/Downloads/*.AppImage

targets:
  usb:
    enabled: true
    label: LinuxBackup
    repository_path: restic/linux-mint

  nas:
    enabled: false
    mount_path: /mnt/backup-nas
    repository_path: restic/linux-mint

retention:
  keep_daily: 14
  keep_weekly: 8
  keep_monthly: 12
  keep_yearly: 3

schedule:
  enabled: true
  daily_time: "20:00"
  interval_days: 1
  boot_delay_minutes: 2

checks:
  restic_check_interval_days: 30

notifications:
  notify_on_success: false
  notify_on_error: true
